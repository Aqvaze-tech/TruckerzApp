name: Android CI
on:
  push:
    paths: ['android-app/**']
  pull_request:
    paths: ['android-app/**']
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
      - run: ./gradlew test
